name: deploy / gh-pages

on:
  pull_request:
    paths:
      - .github/workflows/deploy--gh-pages.yaml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - playwright.config.ts
      - playwright.prod.config.ts
      - tests/**
      - packages/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy--gh-pages.yaml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - playwright.config.ts
      - playwright.prod.config.ts
      - tests/**
      - packages/**

permissions:
  contents: read

concurrency:
  group: gh-pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=npm depName=pnpm
  PNPM_VERSION: "11.2.2"

jobs:
  build-and-ui-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build production bundle
        run: pnpm build
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run production UI smoke inspection
        run: pnpm ui:inspect:prod
      - name: Upload Playwright output
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prod-ui-inspection
          path: test-results/prod-ui-inspection
          if-no-files-found: ignore
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: packages/web/app-dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-ui-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
