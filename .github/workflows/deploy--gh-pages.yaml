name: deploy / gh-pages

on:
  pull_request:
    paths:
      - .github/workflows/deploy--gh-pages.yaml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - playwright.config.ts
      - playwright.prod.config.ts
      - tests/**
      - packages/**
      - workflow-scripts/web-playback-assets.mjs
      - workflow-scripts/web-playback-assets.test.mjs
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy--gh-pages.yaml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - playwright.config.ts
      - playwright.prod.config.ts
      - tests/**
      - packages/**
      - workflow-scripts/web-playback-assets.mjs
      - workflow-scripts/web-playback-assets.test.mjs

permissions:
  contents: read

concurrency:
  group: gh-pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=npm depName=pnpm
  PNPM_VERSION: "11.1.2"

jobs:
  build-and-ui-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install MuseScore General SoundFont package
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends musescore-general-soundfont-small
      - name: Verify MuseScore General SoundFont license
        run: pnpm web:soundfont:prepare
      - name: Build production bundle
        env:
          VITE_FUGEMATON_SOUNDFONT_URL: /soundfonts/MuseScore_General.sf3
        run: pnpm build
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Generate Open Graph preview image
        run: pnpm web:og-image:app-dist
      - name: Verify Open Graph preview image
        run: test -s packages/web/app-dist/og-image.png
      - name: Run production UI smoke inspection
        run: pnpm ui:inspect:prod
      - name: Upload Playwright output
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: prod-ui-inspection
          path: test-results/prod-ui-inspection
          if-no-files-found: ignore
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: packages/web/app-dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-ui-smoke
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
