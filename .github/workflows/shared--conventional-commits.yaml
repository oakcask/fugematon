name: shared / conventional commits

on:
  workflow_call:
    inputs:
      payload:
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    container: openpolicyagent/conftest:v0.68.2@sha256:5fd81e332d7e4bc01daf3ef35371800a9a9720a30c0c37a78de0c5fbe4b6d622
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Write Conventional Commits input
        shell: sh
        env:
          CONVENTIONAL_COMMITS_PAYLOAD: ${{ inputs.payload }}
        run: |
          set -eu
          printf '%s\n' "${CONVENTIONAL_COMMITS_PAYLOAD}" > conventional-commits.json
      - name: Validate Conventional Commits syntax
        run: conftest test -o github -p conftest/conventional-commits conventional-commits.json
