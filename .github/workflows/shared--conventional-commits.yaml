name: shared / conventional commits

on:
  workflow_call:
    inputs:
      payload:
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    container: openpolicyagent/conftest:latest
    steps:
      - uses: actions/checkout@v6
      - name: Write Conventional Commits input
        shell: sh
        env:
          CONVENTIONAL_COMMITS_PAYLOAD: ${{ inputs.payload }}
        run: |
          set -eu
          printf '%s\n' "${CONVENTIONAL_COMMITS_PAYLOAD}" > conventional-commits.json
      - name: Validate Conventional Commits syntax
        run: conftest test -o github -p conftest/conventional-commits conventional-commits.json
