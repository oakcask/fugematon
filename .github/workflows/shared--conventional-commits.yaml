name: shared / conventional commits

on:
  workflow_call:
    inputs:
      subjects:
        required: true
        type: string
      label:
        required: false
        type: string
        default: subject

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commits syntax
        shell: bash
        env:
          SUBJECTS: ${{ inputs.subjects }}
          LABEL: ${{ inputs.label }}
        run: |
          set -euo pipefail

          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9._-]+\))?!?: .+$'
          failed=0

          while IFS= read -r subject; do
            if [[ -z "${subject}" ]]; then
              continue
            fi

            if [[ ! "${subject}" =~ ${pattern} ]]; then
              printf 'Invalid %s: %s\n' "${LABEL}" "${subject}"
              failed=1
            fi
          done <<< "${SUBJECTS}"

          if [[ "${failed}" -ne 0 ]]; then
            printf '\n%s must follow Conventional Commits, for example: feat(cli): add dry-run option\n' "${LABEL}"
            exit 1
          fi
