name: lint / conventional commits

on:
  pull_request:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      subjects: ${{ steps.subjects.outputs.subjects }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Collect commit subjects
        id: subjects
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          delimiter="commit_subjects_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"

          {
            printf 'subjects<<%s\n' "${delimiter}"
            git log --format=%s "${PR_BASE_SHA}..${PR_HEAD_SHA}"
            printf '%s\n' "${delimiter}"
          } >> "${GITHUB_OUTPUT}"

  validate:
    needs: collect
    uses: ./.github/workflows/shared--conventional-commits.yaml
    with:
      subjects: ${{ needs.collect.outputs.subjects }}
      label: commit subject
