name: lint / conventional commits

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate commit messages
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [[ "${BEFORE_SHA}" =~ ^0+$ ]]; then
            range="${HEAD_SHA}"
          else
            range="${BEFORE_SHA}..${HEAD_SHA}"
          fi

          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9._-]+\))?!?: .+$'
          failed=0

          while IFS= read -r subject; do
            if [[ ! "${subject}" =~ ${pattern} ]]; then
              printf 'Invalid commit subject: %s\n' "${subject}"
              failed=1
            fi
          done < <(git log --format=%s "${range}")

          if [[ "${failed}" -ne 0 ]]; then
            printf '\nCommit subjects must follow Conventional Commits, for example: feat(cli): add dry-run option\n'
            exit 1
          fi
