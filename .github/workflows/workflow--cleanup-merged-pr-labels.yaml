name: workflow / cleanup merged PR labels

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  cleanup-merged-pr-labels:
    name: Cleanup merged PR labels
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    env:
      AUTO_REBASE_LABEL: auto-rebase
      MANUAL_REBASE_LABEL: needs-manual-rebase

    steps:
      - name: Remove rebase labels from merged PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          AUTO_REBASE_LABEL: ${{ env.AUTO_REBASE_LABEL }}
          MANUAL_REBASE_LABEL: ${{ env.MANUAL_REBASE_LABEL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const labels = [
              process.env.AUTO_REBASE_LABEL,
              process.env.MANUAL_REBASE_LABEL,
            ];
            const issue_number = Number(process.env.PR_NUMBER);

            for (const name of labels) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }
